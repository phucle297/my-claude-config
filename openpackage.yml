name: my-claude-config
version: 1.0.0
description: Structured AI coding workflow — beads, mempalace, omo orchestration for Jira-driven frontend teams
author: phucle297
license: MIT

agents:
  - path: agents/frontend-dev.md
    platforms: [claude, opencode]
  - path: agents/reviewer.md
    platforms: [claude, opencode]

mcp:
  mempalace:
    type: local
    command: [mempalace-mcp, --palace, "{env:HOME}/.mempalace/{env:OPENCODE_PROJECT_SLUG}"]
    platforms: [claude, opencode]
  agent-mail:
    type: local
    command: [uv, run, python, -m, mcp_agent_mail.server]
    platforms: [claude, opencode]

platforms:
  claude:
    instructions: CLAUDE.md
    settings: settings.json
  opencode:
    instructions: AGENTS.md
    config: opencode.json
